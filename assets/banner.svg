<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="35%" stop-color="#0f1029"/>
      <stop offset="65%" stop-color="#130d2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="300" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="wire-a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wire-b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="150" y1="0" x2="150" y2="420"/><line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="450" y1="0" x2="450" y2="420"/><line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="750" y1="0" x2="750" y2="420"/><line x1="900" y1="0" x2="900" y2="420"/>
    <line x1="1050" y1="0" x2="1050" y2="420"/>
  </g>

  <!-- Circuit wires -->
  <path d="M 60 220 Q 200 140 380 220 Q 500 280 600 210 Q 720 140 850 220 Q 960 280 1140 200" stroke="url(#wire-a)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M 100 250 Q 260 310 430 240 Q 560 180 680 250 Q 820 320 1000 230" stroke="url(#wire-b)" stroke-width="1.5" fill="none" filter="url(#soft)"/>
  <path d="M 180 200 Q 300 270 460 200 Q 580 150 720 210 Q 860 270 1050 190" stroke="url(#wire-a)" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="140" cy="220" r="5" fill="#818cf8" opacity="0.7"/>
    <circle cx="380" cy="220" r="5" fill="#c084fc" opacity="0.7"/>
    <circle cx="600" cy="210" r="7" fill="#f472b6" opacity="0.8"/>
    <circle cx="850" cy="220" r="5" fill="#c084fc" opacity="0.7"/>
    <circle cx="1060" cy="200" r="5" fill="#818cf8" opacity="0.7"/>
  </g>

  <!-- Component boxes -->
  <g filter="url(#soft)">
    <rect x="100" y="195" rx="6" width="80" height="50" fill="#0a0a1a" stroke="#6366f1" stroke-width="1.2" opacity="0.9"/>
    <text x="140" y="218" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9" font-weight="bold">TOOLS</text>
    <text x="140" y="233" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="7" opacity="0.6">R/W/Exec</text>
  </g>
  <g filter="url(#soft)">
    <rect x="335" y="195" rx="6" width="90" height="50" fill="#0a0a1a" stroke="#22d3ee" stroke-width="1.2" opacity="0.9"/>
    <text x="380" y="218" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="9" font-weight="bold">CONTEXT</text>
    <text x="380" y="233" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="7" opacity="0.6">Compaction</text>
  </g>
  <g filter="url(#glow-lg)">
    <rect x="555" y="185" rx="8" width="90" height="52" fill="#0a0a1a" stroke="url(#accent)" stroke-width="2"/>
    <text x="600" y="208" text-anchor="middle" fill="#c084fc" font-family="monospace" font-size="11" font-weight="bold">LLM</text>
    <text x="600" y="224" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="7" opacity="0.7">ENGINE</text>
  </g>
  <g filter="url(#soft)">
    <rect x="805" y="195" rx="6" width="90" height="50" fill="#0a0a1a" stroke="#f472b6" stroke-width="1.2" opacity="0.9"/>
    <text x="850" y="218" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="9" font-weight="bold">SECURITY</text>
    <text x="850" y="233" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="7" opacity="0.6">7-stage</text>
  </g>
  <g filter="url(#soft)">
    <rect x="1015" y="175" rx="6" width="90" height="50" fill="#0a0a1a" stroke="#6366f1" stroke-width="1.2" opacity="0.9"/>
    <text x="1060" y="198" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="9" font-weight="bold">ROUTER</text>
    <text x="1060" y="213" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="7" opacity="0.6">Model Tier</text>
  </g>

  <!-- Title -->
  <text x="600" y="68" text-anchor="middle" fill="url(#title-grad)" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="900" letter-spacing="0.5">
    oh-my-harness-engineering
  </text>

  <!-- Subtitle -->
  <text x="600" y="104" text-anchor="middle" fill="#e0e7ff" font-family="system-ui, sans-serif" font-size="17" font-weight="300" opacity="0.85">
    The model isn't the moat — the system is.
  </text>

  <!-- Divider line -->
  <line x1="420" y1="120" x2="780" y2="120" stroke="url(#accent)" stroke-width="0.5" opacity="0.3"/>

  <!-- Stats bar -->
  <g font-family="monospace" font-size="12" opacity="0.55">
    <text x="250" y="290" text-anchor="middle" fill="#818cf8">45+ Harnesses</text>
    <text x="380" y="290" text-anchor="middle" fill="#4b5563">|</text>
    <text x="490" y="290" text-anchor="middle" fill="#c084fc">30+ Papers</text>
    <text x="600" y="290" text-anchor="middle" fill="#4b5563">|</text>
    <text x="710" y="290" text-anchor="middle" fill="#22d3ee">6 Case Studies</text>
    <text x="830" y="290" text-anchor="middle" fill="#4b5563">|</text>
    <text x="960" y="290" text-anchor="middle" fill="#f472b6">4 Protocols</text>
  </g>

  <!-- Four layers -->
  <g font-family="monospace" font-size="10">
    <rect x="170" y="320" rx="12" width="180" height="28" fill="#0f1029" stroke="#6366f1" stroke-width="0.8" opacity="0.6"/>
    <text x="260" y="339" text-anchor="middle" fill="#818cf8" opacity="0.7">L1: Weights</text>

    <rect x="370" y="320" rx="12" width="180" height="28" fill="#0f1029" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
    <text x="460" y="339" text-anchor="middle" fill="#22d3ee" opacity="0.7">L2: Context</text>

    <rect x="570" y="320" rx="12" width="180" height="28" fill="#0f1029" stroke="#c084fc" stroke-width="0.8" opacity="0.6"/>
    <text x="660" y="339" text-anchor="middle" fill="#c084fc" opacity="0.7">L3: Harness</text>

    <rect x="770" y="320" rx="12" width="195" height="28" fill="#0f1029" stroke="#f472b6" stroke-width="1" opacity="0.7"/>
    <text x="868" y="339" text-anchor="middle" fill="#f472b6" opacity="0.85" font-weight="bold">L4: Infrastructure</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="385" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="11" opacity="0.4">
    Architecture patterns from studying 45+ production agent systems
  </text>

  <!-- Corner accents -->
  <path d="M 0 0 L 50 0 L 0 50 Z" fill="#818cf8" opacity="0.08"/>
  <path d="M 1200 0 L 1150 0 L 1200 50 Z" fill="#f472b6" opacity="0.08"/>
  <path d="M 0 420 L 50 420 L 0 370 Z" fill="#22d3ee" opacity="0.06"/>
  <path d="M 1200 420 L 1150 420 L 1200 370 Z" fill="#c084fc" opacity="0.06"/>
</svg>
