<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="wire1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wire2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="40%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#6366f1" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Connection wires (harness concept) -->
  <path d="M 80 200 Q 200 120 350 200" stroke="url(#wire1)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M 350 200 Q 500 280 650 200" stroke="url(#wire2)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M 650 200 Q 800 120 950 200" stroke="url(#wire1)" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M 950 200 Q 1050 260 1120 200" stroke="url(#wire2)" stroke-width="1.5" fill="none" filter="url(#glow)"/>

  <!-- Secondary wires -->
  <path d="M 120 180 Q 250 280 420 180" stroke="url(#wire2)" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 500 220 Q 620 140 780 220" stroke="url(#wire1)" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 780 220 Q 900 300 1050 180" stroke="url(#wire2)" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Node: LLM (center) -->
  <g filter="url(#glow-strong)">
    <circle cx="600" cy="200" r="38" fill="#0f0f23" stroke="url(#accent)" stroke-width="2.5"/>
    <text x="600" y="196" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="12" font-weight="bold">LLM</text>
    <text x="600" y="212" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="9" opacity="0.8">ENGINE</text>
  </g>

  <!-- Node: Tools -->
  <g filter="url(#glow)">
    <rect x="105" y="172" rx="8" width="76" height="56" fill="#0f0f23" stroke="#6366f1" stroke-width="1.5"/>
    <text x="143" y="196" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">Tools</text>
    <text x="143" y="212" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="8" opacity="0.7">R/W/Exec</text>
  </g>

  <!-- Node: Context -->
  <g filter="url(#glow)">
    <rect x="305" y="172" rx="8" width="90" height="56" fill="#0f0f23" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="350" y="196" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10" font-weight="bold">Context</text>
    <text x="350" y="212" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="8" opacity="0.7">Compaction</text>
  </g>

  <!-- Node: Router -->
  <g filter="url(#glow)">
    <rect x="810" y="172" rx="8" width="80" height="56" fill="#0f0f23" stroke="#6366f1" stroke-width="1.5"/>
    <text x="850" y="196" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">Router</text>
    <text x="850" y="212" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="8" opacity="0.7">Model Tier</text>
  </g>

  <!-- Node: Security -->
  <g filter="url(#glow)">
    <rect x="1010" y="172" rx="8" width="90" height="56" fill="#0f0f23" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="1055" y="196" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10" font-weight="bold">Security</text>
    <text x="1055" y="212" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="8" opacity="0.7">Sandbox</text>
  </g>

  <!-- Dot nodes on wires -->
  <circle cx="215" cy="155" r="3" fill="#6366f1" filter="url(#glow)" opacity="0.8"/>
  <circle cx="480" cy="245" r="3" fill="#22d3ee" filter="url(#glow)" opacity="0.8"/>
  <circle cx="730" cy="160" r="3" fill="#a78bfa" filter="url(#glow)" opacity="0.8"/>
  <circle cx="980" cy="230" r="3" fill="#22d3ee" filter="url(#glow)" opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="72" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" letter-spacing="1">
    Awesome Agentic Harness
  </text>

  <!-- Subtitle -->
  <text x="600" y="105" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="16" opacity="0.9">
    The model isn't the moat — the system is.
  </text>

  <!-- Bottom tagline -->
  <text x="600" y="340" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="12" opacity="0.6">
    Architecture patterns from studying 20+ production agent systems
  </text>

  <!-- Bottom stats -->
  <g opacity="0.5">
    <text x="340" y="370" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="11">10 Components</text>
    <text x="490" y="370" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="11">|</text>
    <text x="600" y="370" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="11">Case Studies</text>
    <text x="710" y="370" text-anchor="middle" fill="#6366f1" font-family="monospace" font-size="11">|</text>
    <text x="860" y="370" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="11">Papers &amp; Resources</text>
  </g>

  <!-- Corner decorations -->
  <path d="M 0 0 L 40 0 L 0 40 Z" fill="#6366f1" opacity="0.15"/>
  <path d="M 1200 0 L 1160 0 L 1200 40 Z" fill="#22d3ee" opacity="0.15"/>
  <path d="M 0 400 L 40 400 L 0 360 Z" fill="#22d3ee" opacity="0.1"/>
  <path d="M 1200 400 L 1160 400 L 1200 360 Z" fill="#6366f1" opacity="0.1"/>
</svg>
