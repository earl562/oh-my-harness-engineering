<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <linearGradient id="bg-arch" x1="0" y1="0" x2="900" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gs">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg-arch)" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Anatomy of an Agentic Harness</text>

  <!-- === LAYER: User Input (top) === -->
  <g filter="url(#g)">
    <rect x="340" y="55" width="220" height="40" rx="20" fill="#0f0f23" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="450" y="80" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="bold">User Input</text>
  </g>

  <!-- Arrow down -->
  <line x1="450" y1="95" x2="450" y2="120" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <polygon points="445,118 450,128 455,118" fill="#6366f1" opacity="0.6"/>

  <!-- === LAYER: System Prompt + Context === -->
  <g filter="url(#g)">
    <rect x="220" y="130" width="460" height="44" rx="8" fill="#0f0f23" stroke="url(#cyan)" stroke-width="1.5"/>
    <text x="320" y="157" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="11" font-weight="bold">System Prompt</text>
    <line x1="400" y1="140" x2="400" y2="164" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
    <text x="450" y="157" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="11">+</text>
    <text x="560" y="157" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="11" font-weight="bold">Context + History</text>
  </g>

  <!-- Arrow down -->
  <line x1="450" y1="174" x2="450" y2="198" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <polygon points="445,196 450,206 455,196" fill="#6366f1" opacity="0.6"/>

  <!-- === CORE: Agent Loop (big center box) === -->
  <rect x="100" y="208" width="700" height="200" rx="12" fill="#0f0f23" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 3" opacity="0.5"/>
  <text x="130" y="232" fill="#6366f1" font-family="monospace" font-size="10" opacity="0.5">AGENT LOOP</text>

  <!-- Model Router -->
  <g filter="url(#g)">
    <rect x="130" y="248" width="140" height="60" rx="8" fill="#1a1a3e" stroke="url(#amber)" stroke-width="1.5"/>
    <text x="200" y="272" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="11" font-weight="bold">Model Router</text>
    <text x="200" y="292" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="9" opacity="0.7">haiku|sonnet|opus</text>
  </g>

  <!-- LLM Provider -->
  <g filter="url(#gs)">
    <rect x="320" y="245" width="160" height="66" rx="10" fill="#1a1a3e" stroke="url(#purple)" stroke-width="2"/>
    <text x="400" y="272" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="13" font-weight="bold">LLM Provider</text>
    <text x="400" y="292" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="9" opacity="0.7">stream response</text>
  </g>

  <!-- Response Parser -->
  <g filter="url(#g)">
    <rect x="530" y="248" width="140" height="60" rx="8" fill="#1a1a3e" stroke="url(#cyan)" stroke-width="1.5"/>
    <text x="600" y="272" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="11" font-weight="bold">Parser</text>
    <text x="600" y="292" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="9" opacity="0.7">text | tool_calls</text>
  </g>

  <!-- Arrows between router -> LLM -> parser -->
  <line x1="270" y1="278" x2="320" y2="278" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  <polygon points="316,275 324,278 316,281" fill="#fbbf24" opacity="0.5"/>
  <line x1="480" y1="278" x2="530" y2="278" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <polygon points="526,275 534,278 526,281" fill="#a78bfa" opacity="0.5"/>

  <!-- Tool Execution Row -->
  <!-- Permission Check -->
  <g filter="url(#g)">
    <rect x="200" y="340" width="130" height="50" rx="8" fill="#1a1a3e" stroke="url(#pink)" stroke-width="1.5"/>
    <text x="265" y="362" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="10" font-weight="bold">Permissions</text>
    <text x="265" y="378" text-anchor="middle" fill="#ec4899" font-family="monospace" font-size="8" opacity="0.7">allow|ask|deny</text>
  </g>

  <!-- Tool Execution -->
  <g filter="url(#g)">
    <rect x="380" y="340" width="140" height="50" rx="8" fill="#1a1a3e" stroke="url(#green)" stroke-width="1.5"/>
    <text x="450" y="362" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="10" font-weight="bold">Tool Exec</text>
    <text x="450" y="378" text-anchor="middle" fill="#10b981" font-family="monospace" font-size="8" opacity="0.7">R/W/Bash/Web</text>
  </g>

  <!-- Results -> History -->
  <g filter="url(#g)">
    <rect x="570" y="340" width="130" height="50" rx="8" fill="#1a1a3e" stroke="url(#cyan)" stroke-width="1.5"/>
    <text x="635" y="362" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10" font-weight="bold">Results</text>
    <text x="635" y="378" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="8" opacity="0.7">append history</text>
  </g>

  <!-- Arrows: parser -> permissions -> tool exec -> results -->
  <path d="M 600 308 L 600 320 Q 600 330 590 330 L 265 330 Q 255 330 255 340" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.4"/>
  <text x="420" y="326" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="8" opacity="0.5">tool_calls?</text>
  <line x1="330" y1="365" x2="380" y2="365" stroke="#f472b6" stroke-width="1" opacity="0.4"/>
  <polygon points="376,362 384,365 376,368" fill="#f472b6" opacity="0.4"/>
  <line x1="520" y1="365" x2="570" y2="365" stroke="#34d399" stroke-width="1" opacity="0.4"/>
  <polygon points="566,362 574,365 566,368" fill="#34d399" opacity="0.4"/>

  <!-- Loop arrow: results back to top of agent loop -->
  <path d="M 700 365 Q 760 365 760 278 Q 760 220 700 220 L 450 220 Q 400 220 400 245" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.4" stroke-dasharray="4 2"/>
  <text x="775" y="300" fill="#6366f1" font-family="monospace" font-size="9" opacity="0.4" transform="rotate(-90 775 300)">LOOP</text>

  <!-- === LAYER: Output (bottom) === -->
  <!-- Arrow down from parser for text output -->
  <line x1="450" y1="408" x2="450" y2="440" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <polygon points="445,438 450,448 455,438" fill="#6366f1" opacity="0.6"/>

  <!-- TUI -->
  <g filter="url(#g)">
    <rect x="330" y="450" width="240" height="44" rx="20" fill="#0f0f23" stroke="url(#green)" stroke-width="1.5"/>
    <text x="450" y="477" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="13" font-weight="bold">Stream to User</text>
  </g>

  <!-- Side labels -->
  <text x="50" y="290" fill="#6366f1" font-family="monospace" font-size="9" opacity="0.3" transform="rotate(-90 50 290)">HARNESS RUNTIME</text>
  <text x="870" y="290" fill="#6366f1" font-family="monospace" font-size="9" opacity="0.3" transform="rotate(90 870 290)">OBSERVE-ACT CYCLE</text>
</svg>
